services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend-inventory:
    build:
      context: ./backend-inventory
      dockerfile: Dockerfile
    # CHANGED: Switched to runserver for hot-reloading code changes in dev
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend-inventory:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery-worker:
    build:
      context: ./backend-inventory
      dockerfile: Dockerfile
    command: celery -A core worker --loglevel=info
    volumes:
      - ./backend-inventory:/app
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  backend-pos:
    build:
      context: ./backend-pos
      dockerfile: Dockerfile
    # CHANGED: Generate prisma client instead of running duplicate migrations; use watch mode
    command: sh -c "npx prisma generate && node --watch src/index.js"
    volumes:
      - ./backend-pos:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    # CHANGED: Added explicit command with --host flag so you can access Vite from your browser
    command: npm run dev -- --host
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    env_file:
      - .env
    depends_on:
      - backend-inventory
      - backend-pos
    restart: unless-stopped